services:
  - type: web
    name: educontrol-api
    runtime: python
    plan: free
    rootDir: back
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: educontrol-nskr.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://edu-control-azure.vercel.app
      - key: SECRET_KEY
        generateValue: true
